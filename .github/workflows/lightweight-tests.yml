name: Lightweight tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lightweight test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Run lightweight tests
        run: python -B -m pytest -q

      - name: Run file smoke without report output
        run: python -B scripts/smoke_scan.py --no-report
